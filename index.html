    function createImg() {
        const pictureContainer = document.getElementById("pictures");
        const noticeBox = document.getElementById("syntax-notice");
        
        // clear words
        pictureContainer.innerHTML = ""; 
        noticeBox.textContent = "";

        // get clean inut
        let rawInput = document.getElementById('english').value.toLowerCase();
        let cleanInput = rawInput.replace(/[.,!?'']/g, ""); 
        let initialArray = cleanInput.split(" ").filter(word => word !== ""); 
        console.log(`${initialArray}`)
        //  syntax filter
        const syntaxToSkip = ["are", "is", "am", "the", "a", "my", "it"]; 
        let removedWords = [];
        let wordsArray = initialArray.filter(word => {
            if (syntaxToSkip.includes(word)) {
                removedWords.push(word);
                return false;
            }
            return true;
        });

        // syntax message if words were skipped
        if (removedWords.length > 0) {
            let uniqueRemoved = [...new Set(removedWords)];
            noticeBox.textContent = `Note: "${uniqueRemoved.join(', ')}" removed due to NZSL syntax rules.`;
        }

        // translation Loop
        let i = 0; 
        while (i < wordsArray.length) {
            let matchFound = false;
            for (let j = wordsArray.length; j > i; j--) {
                let phrase = wordsArray.slice(i, j).join(" ");
                
                if (dictionary[phrase]) {
                    appendSignImage(dictionary[phrase], phrase, pictureContainer, false);
                    i = j; 
                    matchFound = true;
                    break; 
                }
            }

            // Fingerspelling 
            if (!matchFound) {
                let unknownWord = wordsArray[i];
                let wordSpan = document.createElement("span");
                wordSpan.className = "fingerspell-word";

                for (let char of unknownWord) {
                    let letterKey = "letter_" + char;
                    
                    if (dictionary[letterKey]) {
                        appendSignImage(dictionary[letterKey], char, wordSpan, true);
                    } 
                    
                        else {
                        // nothing works --> display txt
                        let letterText = document.createElement("span");
                        letterText.textContent = char;
                        wordSpan.appendChild(letterText);
                    }
                }
                
                pictureContainer.appendChild(wordSpan);
                i++; 
            }
        }
        }
function appendSignImage(src, alt, container, isLetter) {
    let elem = document.createElement("img");
    elem.src = src;
    elem.alt = alt;
    elem.className = "sign-image";
    elem.style.height = "200px";
    elem.style.width = "auto"; 

    elem.onerror = function() {
        let fallback = document.createElement("span");
        fallback.textContent = isLetter ? alt : ` [${alt}] `;
        fallback.style.fontWeight = "bold";
        fallback.style.fontSize = "24px"; 
        this.replaceWith(fallback);
    };

    container.appendChild(elem);
}
